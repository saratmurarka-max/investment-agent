services:
  - type: web
    name: investment-agent-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # You will enter this manually in Render dashboard
      - key: DATABASE_URL
        fromDatabase:
          name: investment-agent-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a random secret

databases:
  - name: investment-agent-db
    plan: free
    databaseName: investment_agent
    user: investment_agent
